services:
  surveillance-node:
    container_name: surveillance-node
    build:
      context: .
      dockerfile: Dockerfile
    image: surveillance-node:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    env_file:
      - .env
    environment:
      SSL_CERT_PATH: /app/cert.pem
      SSL_KEY_PATH: /app/key.pem
      FACE_RECOGNITION_KNOWN_FACES_DIR: /known_faces
      XDG_RUNTIME_DIR: /run/user/1000
      PULSE_SERVER: unix:/run/user/1000/pulse/native
      PULSE_COOKIE: /tmp/pulse-cookie
    volumes:
      - ./cert.pem:/app/cert.pem:ro
      - ./key.pem:/app/key.pem:ro
      - ${FACE_RECOGNITION_KNOWN_FACES_DIR:-./known_faces}:/known_faces:ro
      - /dev:/dev
      - /dev/snd:/dev/snd
      - /run/user/1000/pulse/native:/run/user/1000/pulse/native
      - /home/eric/.config/pulse/cookie:/tmp/pulse-cookie:ro
      - /run/udev:/run/udev:ro
    group_add:
      - audio
      - video
