<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Surveillance Node</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
    .grid { display: grid; gap: 12px; grid-template-columns: 2fr 1fr; }
    .panel { background: #1f1f1f; border: 1px solid #333; border-radius: 8px; padding: 12px; }
    img { width: 100%; background: #000; border-radius: 8px; }
    label { display: block; margin-top: 8px; }
    input, select, button { width: 100%; padding: 8px; margin-top: 4px; }
    .row { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
    
    .volume-meter {
      margin-top: 12px;
      padding: 8px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
    }
    
    .volume-meter-label {
      font-size: 0.9em;
      margin-bottom: 6px;
      color: #aaa;
    }
    
    .volume-bar-container {
      width: 100%;
      height: 18px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #333;
      position: relative;
    }
    
    .volume-bar {
      height: 100%;
      background: linear-gradient(90deg, #2ecc71 0%, #f1c40f 68%, #e74c3c 100%);
      transition: width 0.12s ease-out;
      width: 0%;
    }
    
    .volume-text {
      font-size: 0.8em;
      color: #888;
      margin-top: 4px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Surveillance (Node.js)</h1>
  <div class="grid">
    <div class="panel">
      <img id="video" alt="video stream" />
      <button id="talkToggle">Hold to Talk</button>
      <div class="volume-meter">
        <div class="volume-meter-label">🎤 Microphone Input Level:</div>
        <div class="volume-bar-container">
          <div class="volume-bar" id="mic-volume-bar"></div>
        </div>
        <p class="volume-text" id="mic-volume-text">0% · Silent</p>
      </div>
    </div>
    <div class="panel">
      <h3>Camera</h3>
      <label>Device<select id="cameraDevice"></select></label>
      <label>Resolution<select id="resolution"></select></label>
      <label>FPS<input id="fps" type="number" /></label>
      <button id="saveCamera">Save Camera Settings</button>

      <h3>Audio Devices</h3>
      <label>Microphone<select id="microphone"></select></label>
      <label>Speaker<select id="speaker"></select></label>
      <button id="saveAudioDevices">Save Audio Devices</button>

      <h3>Speaker Volume</h3>
      <label>Volume<input id="volume" type="range" min="0" max="100" /></label>
      <p class="volume-text" id="currentVolumeDisplay">--% (Reading...)</p>
      <button id="saveVolume">Apply Volume</button>

      <div class="volume-meter">
        <div class="volume-meter-label">🔊 Speaker Output Level:</div>
        <div class="volume-bar-container">
          <div class="volume-bar" id="speaker-volume-bar"></div>
        </div>
        <p class="volume-text" id="speaker-volume-text">0% · Silent</p>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
